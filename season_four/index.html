<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Project ML</title>
  <link rel="stylesheet" href="styles.css?v=1" />
</head>
<body>
    <div id="top-container">
      <div id="ls">
        <!-- make a ledgend -->
         <div class="legend">
            <div class="legend-item">
                <span class="geekLand legend-color"></span>
                <span>Geek Land</span>
            </div>

            <div class="legend-item">
                <span class="oni legend-color"></span>
                <span>Oni</span>
            </div>

        </div>
      </div>
      <div id="rs">
        <div class="toggle-container">
            <label for="geekToggle" class="toggle">
                <input type="checkbox" id="geekToggle">
                <span class="slider"></span>
            </label>
            <span class="toggle-label">Geek Land</span>
        </div>

        <div class="toggle-container">
            <label for="oniToggle" class="toggle">
                <input type="checkbox" id="oniToggle">
                <span class="slider"></span>
            </label>
            <span class="toggle-label">Oni</span>
        </div>
      </div>
    </div>
    <div id="bottom-container"></div>
  
  <script src="app.js?v=1"></script>
</body>
</html>
